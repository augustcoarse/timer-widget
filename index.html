<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #c8f060;
    --accent-dim: rgba(200, 240, 96, 0.12);
    --text-primary: #f0f0f0;
    --text-muted: #666;
    --text-dim: #333;
    --danger: #ff5c5c;
    --radius: 4px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Syne', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .container {
    width: 360px;
    padding: 40px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    position: relative;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
  }

  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .status-dot.running { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.done { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

  /* Quick select */
  .quick-select {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
  }

  .quick-btn {
    flex: 1;
    padding: 10px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .quick-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Timer display */
  .timer-display {
    text-align: center;
    margin-bottom: 12px;
    position: relative;
  }

  .time-value {
    font-family: 'DM Mono', monospace;
    font-size: 72px;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text-primary);
    transition: color 0.3s;
    user-select: none;
  }

  .time-value.done { color: var(--danger); }

  /* Progress bar */
  .progress-track {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-bottom: 40px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    width: 100%;
    transform-origin: left;
    transition: transform 0.5s linear, background 0.3s;
  }

  .progress-fill.done { background: var(--danger); }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
  }

  .btn-primary {
    flex: 1;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0e0e0e;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    padding: 14px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-secondary:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
  }

  /* Custom input row */
  .custom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .custom-row label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
    font-weight: 600;
  }

  .custom-input {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
    width: 60px;
    text-align: center;
  }

  .custom-input:focus { border-color: var(--accent); }

  .custom-sep {
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
  }

  .btn-set {
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-set:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Flash animation when done */
  @keyframes flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .time-value.flashing { animation: flash 0.8s ease infinite; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="label">Timer</span>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="quick-select">
    <button class="quick-btn" data-seconds="120">2 min</button>
    <button class="quick-btn" data-seconds="900">15 min</button>
    <button class="quick-btn" data-seconds="3600">1 hr</button>
  </div>

  <div class="timer-display">
    <div class="time-value" id="timeDisplay">00:00</div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="controls">
    <button class="btn-primary" id="startBtn">Start</button>
    <button class="btn-secondary" id="resetBtn">Reset</button>
  </div>

  <div class="custom-row">
    <label>Custom</label>
    <input class="custom-input" type="number" id="customHr" placeholder="HH" min="0" max="23" value="">
    <span class="custom-sep">:</span>
    <input class="custom-input" type="number" id="customMin" placeholder="MM" min="0" max="59" value="">
    <span class="custom-sep">:</span>
    <input class="custom-input" type="number" id="customSec" placeholder="SS" min="0" max="59" value="">
    <button class="btn-set" id="setBtn">Set</button>
  </div>
</div>

<script>
  let totalSeconds = 0;
  let remainingSeconds = 0;
  let intervalId = null;
  let running = false;
  let done = false;
  let alarmType = 'custom'; // '2min', '15min', '1hr', 'custom'
  let alarmTimeouts = [];

  const timeDisplay = document.getElementById('timeDisplay');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const progressFill = document.getElementById('progressFill');
  const statusDot = document.getElementById('statusDot');
  const quickBtns = document.querySelectorAll('.quick-btn');

  function formatTime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) {
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function updateDisplay() {
    timeDisplay.textContent = formatTime(remainingSeconds);
    const pct = totalSeconds > 0 ? remainingSeconds / totalSeconds : 1;
    progressFill.style.transform = `scaleX(${pct})`;
  }

  function setTimer(seconds) {
    pause();
    totalSeconds = seconds;
    remainingSeconds = seconds;
    done = false;
    timeDisplay.classList.remove('done', 'flashing');
    progressFill.classList.remove('done');
    statusDot.className = 'status-dot';
    startBtn.textContent = 'Start';
    updateDisplay();
  }

  function start() {
    if (remainingSeconds <= 0) return;
    running = true;
    done = false;
    startBtn.textContent = 'Pause';
    statusDot.className = 'status-dot running';
    intervalId = setInterval(() => {
      remainingSeconds--;
      updateDisplay();
      if (remainingSeconds <= 0) {
        finish();
      }
    }, 1000);
  }

  function pause() {
    running = false;
    clearInterval(intervalId);
    intervalId = null;
    if (!done) {
      startBtn.textContent = 'Resume';
      statusDot.className = 'status-dot';
    }
  }

  function finish() {
    pause();
    done = true;
    timeDisplay.classList.add('done', 'flashing');
    progressFill.classList.add('done');
    statusDot.className = 'status-dot done';
    startBtn.textContent = 'Start';
    triggerAlarm();
  }

  // --- Chiptune alarm engine ---

  function stopAlarm() {
    alarmTimeouts.forEach(t => clearTimeout(t));
    alarmTimeouts = [];
  }

  function playNotes(notes, volume) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      let t = ctx.currentTime + 0.01;
      notes.forEach(([freq, dur, gap]) => {
        if (freq > 0) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'square';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.001, t);
          gain.gain.linearRampToValueAtTime(volume, t + 0.005);
          gain.gain.setValueAtTime(volume, t + dur - 0.015);
          gain.gain.linearRampToValueAtTime(0.001, t + dur);
          osc.start(t);
          osc.stop(t + dur + 0.02);
        }
        t += dur + (gap || 0);
      });
      return (t - ctx.currentTime) * 1000; // return total ms
    } catch(e) { return 0; }
  }

  // 2 MIN — "Hustle": urgent staccato triplets, repeated 5 times
  // Snappy ascending blips — get back to work
  function alarm2min() {
    const pattern = [
      [659, 0.07, 0.03], [784, 0.07, 0.03], [988, 0.07, 0.12],
      [659, 0.07, 0.03], [784, 0.07, 0.03], [988, 0.07, 0.12],
      [659, 0.07, 0.03], [784, 0.07, 0.03], [1047, 0.28, 0],
    ];
    const dur = playNotes(pattern, 0.38);
    for (let i = 1; i < 5; i++) {
      const t = setTimeout(() => playNotes(pattern, 0.38), i * (dur + 400));
      alarmTimeouts.push(t);
    }
  }

  // 15 MIN — "Breather": a cheerful ascending/descending melody, repeated 3 times
  // G4→B4→D5→G5 rise, then gentle descent — time to breathe
  function alarm15min() {
    const pattern = [
      [392, 0.14, 0.04], [494, 0.14, 0.04], [587, 0.14, 0.04], [784, 0.32, 0.18],
      [659, 0.11, 0.04], [587, 0.11, 0.04], [523, 0.11, 0.04], [440, 0.38, 0],
    ];
    const dur = playNotes(pattern, 0.32);
    for (let i = 1; i < 3; i++) {
      const t = setTimeout(() => playNotes(pattern, 0.32), i * (dur + 600));
      alarmTimeouts.push(t);
    }
  }

  // 1 HR — "Victory": a full chiptune fanfare, played twice
  // Trumpet-style fanfare: C-C-C-E, G-G-G-B, ascending run to C6
  function alarm1hr() {
    const pattern = [
      [523, 0.1, 0.04], [523, 0.1, 0.04], [523, 0.1, 0.04], [659, 0.28, 0.12],
      [784, 0.1, 0.04], [784, 0.1, 0.04], [784, 0.1, 0.04], [988, 0.28, 0.12],
      [523, 0.1, 0.02], [587, 0.1, 0.02], [659, 0.1, 0.02],
      [698, 0.1, 0.02], [784, 0.1, 0.02], [880, 0.1, 0.02],
      [988, 0.1, 0.02], [1047, 0.55, 0],
    ];
    const dur = playNotes(pattern, 0.35);
    const t = setTimeout(() => playNotes(pattern, 0.35), dur + 700);
    alarmTimeouts.push(t);
  }

  function triggerAlarm() {
    stopAlarm();
    if (alarmType === '2min') alarm2min();
    else if (alarmType === '15min') alarm15min();
    else if (alarmType === '1hr') alarm1hr();
    else alarm15min(); // default for custom
  }

  startBtn.addEventListener('click', () => {
    if (totalSeconds === 0 && remainingSeconds === 0) return;
    if (done) { return; }
    if (running) { pause(); } else { start(); }
  });

  resetBtn.addEventListener('click', () => {
    stopAlarm();
    setTimer(totalSeconds);
  });

  quickBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      quickBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const secs = parseInt(btn.dataset.seconds);
      alarmType = secs === 120 ? '2min' : secs === 900 ? '15min' : secs === 3600 ? '1hr' : 'custom';
      setTimer(secs);
    });
  });

  document.getElementById('setBtn').addEventListener('click', () => {
    const h = parseInt(document.getElementById('customHr').value) || 0;
    const m = parseInt(document.getElementById('customMin').value) || 0;
    const s = parseInt(document.getElementById('customSec').value) || 0;
    const total = h * 3600 + m * 60 + s;
    if (total > 0) {
      quickBtns.forEach(b => b.classList.remove('active'));
      alarmType = 'custom';
      setTimer(total);
    }
  });

  // Init display
  updateDisplay();
</script>
</body>
</html>
